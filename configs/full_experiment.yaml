project_root: .
seed: 42
artifacts_dir: artifacts/full_experiment

data:
  mooccube_dir: dataset/MOOCCube
  processed_dir: data/processed/mooccube_full
  # Set to null to consume all available activity users.
  max_users: 2000
  interaction_source: video_activity
  user_hash_salt: introai-full
  course_hash_salt: introai-course-full
  split_strategy: temporal
  outlier_filter:
    enabled: true
    iqr_factor: 3.0

embedding:
  backend: bert
  local_model_dir: models/bert-base-multilingual-cased
  checkpoint_dir: artifacts/full_experiment/bert_checkpoint
  batch_size: 32
  max_length: 128

bert_finetuning:
  enabled: true
  unfreeze_last_layers: 4
  epochs: 3
  batch_size: 8
  learning_rate: 0.00002
  weight_decay: 0.01
  margin: 0.2
  max_triplets: 20000

model:
  dropout: 0.1

training:
  epochs: 100
  early_stopping_patience: 10
  batch_size: 128
  learning_rate: 0.0001
  max_samples: 100000
  negative_samples_per_positive: 3
  ppo_clip_epsilon: 0.2
  discount_factor: 0.99

environment:
  response_mode: synthetic_simulator
  max_steps: 20
  ppo_iterations: 100
  rollout_steps: 1024
  update_epochs: 10
  gae_lambda: 0.95
  entropy_coefficient: 0.01
  supervised_pretrain_epochs: 30
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0001
  minimum_learning_rate: 0.000001
  # Empirical ablation: raw bounded [0,1] rewards outperform z-score rewards.
  normalize_rewards: false
  normalize_advantages: true

mahalanobis:
  covariance: ledoit_wolf
  temperature: 1.0
  n_clusters: 32
  pca_components: 64
  context_weight: 1.0
  logit_fusion_alpha: 0.2
  logit_fusion_beta: 0.1

recommendation:
  top_k: 10
  semantic_weight: 0.0
  action_space: full_catalog
  candidate_size: 150

translation:
  backend: transformers
  local_model_dir: models/opus-mt-zh-en

evaluation:
  max_users: 500
  k_values: [5, 10, 20]
  seeds: [42, 52, 62, 72, 82]

efficiency:
  sessions: 100
